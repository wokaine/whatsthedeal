{% if user.is_authenticated %}
    <form id="likebutton" method="POST" action="{% url 'whatsthedeal:post-preference' post.id 1 %}" style="display:inline">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.build_absolute_uri }}">
        <button class="btn btn-ghost" type="submit">👍 ({{ post.likes }})</button>
    </form>

    <form id="dislikebutton" method="POST" action="{% url 'whatsthedeal:post-preference' post.id 2 %}" style="display:inline">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.build_absolute_uri }}">
        <button class="btn btn-ghost" type="submit">👎 ({{ post.dislikes }})</button>
    </form>
{% endif %}
